<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI活用プロンプト集 | スタッフ向けリファレンス</title>
  <meta name="description" content="業種別AI活用プロンプトテンプレート集。カメラマン・デザイナー・コーダー・ライフサポート・広告代理店向け。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Header -->
  <header class="header" id="header">
    <div class="header__inner">
      <a href="#" class="header__logo" id="logo-link">
        <span class="header__logo-icon">⚡</span>
        <span class="header__logo-text">AI Prompt Lab</span>
      </a>
      <div class="header__search" id="global-search-wrapper">
        <svg class="header__search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" class="header__search-input" id="global-search" placeholder="プロンプトを検索…" autocomplete="off">
        <kbd class="header__search-kbd">/</kbd>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main" id="main">
    <!-- Top Page: Category Cards -->
    <section class="top-page" id="top-page">
      <div class="top-page__hero">
        <h1 class="top-page__title">AI活用プロンプト集</h1>
        <p class="top-page__subtitle">業務で使えるプロンプトテンプレートをカテゴリ別にまとめました。<br>テンプレートをコピーして、【 】内を書き換えるだけで使えます。</p>
      </div>
      <div class="category-grid" id="category-grid">
        <!-- Dynamically generated -->
      </div>
    </section>

    <!-- Category Detail Page -->
    <section class="category-page" id="category-page" style="display:none;">
      <div class="category-page__header">
        <button class="back-btn" id="back-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6" />
          </svg>
          戻る
        </button>
        <div class="category-page__title-row">
          <span class="category-page__icon" id="cat-icon"></span>
          <h2 class="category-page__title" id="cat-title"></h2>
        </div>
        <p class="category-page__desc" id="cat-desc"></p>
      </div>
      <div class="category-page__filter">
        <div class="filter-tabs" id="filter-tabs">
          <!-- Dynamically generated -->
        </div>
      </div>
      <div class="prompt-list" id="prompt-list">
        <!-- Dynamically generated -->
      </div>
    </section>

    <!-- Search Results Page -->
    <section class="search-results" id="search-results" style="display:none;">
      <div class="search-results__header">
        <button class="back-btn" id="search-back-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6" />
          </svg>
          戻る
        </button>
        <h2 class="search-results__title">検索結果: <span id="search-query-display"></span></h2>
        <p class="search-results__count" id="search-count"></p>
      </div>
      <div class="prompt-list" id="search-prompt-list">
        <!-- Dynamically generated -->
      </div>
    </section>
  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="20 6 9 17 4 12" />
    </svg>
    <span id="toast-msg">コピーしました</span>
  </div>

  <footer class="footer">
    <p>© 2026 AI Prompt Lab — 社内スタッフ向けリファレンス</p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>

</html>
