<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Prompt Lab — 業務プロンプト集</title>
  <meta name="description" content="業種別AI活用プロンプトテンプレート集。カメラマン・デザイナー・コーダー・ライフサポート・広告代理店向け。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Header -->
  <header class="header" id="header">
    <div class="header__inner">
      <a href="#" class="header__logo" id="logo-link">
        <span class="header__logo-icon">⚡</span>
        <span class="header__logo-text">AI Prompt Lab</span>
      </a>
      <div class="header__search" id="global-search-wrapper">
        <button class="header__search-trigger" id="search-trigger" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <span class="header__search-trigger-text">プロンプトを検索…</span>
          <kbd class="header__search-kbd">⌘K</kbd>
        </button>
        <!-- Hidden input kept for backward compat -->
        <input type="text" class="header__search-input" id="global-search" placeholder="プロンプトを検索…" autocomplete="off" tabindex="-1">
      </div>
    </div>
  </header>

  <!-- Command Palette -->
  <div class="cmd-palette-overlay" id="cmd-palette-overlay">
    <div class="cmd-palette" id="cmd-palette">
      <div class="cmd-palette__input-wrapper">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" class="cmd-palette__input" id="cmd-search-input" placeholder="プロンプトを検索…" autocomplete="off">
        <span class="cmd-palette__hint">ESC</span>
      </div>
      <div class="cmd-palette__results" id="cmd-results">
        <div class="cmd-palette__empty">キーワードを入力してプロンプトを検索</div>
      </div>
      <div class="cmd-palette__footer">
        <span><kbd>↑↓</kbd> 移動</span>
        <span><kbd>Enter</kbd> 開く</span>
        <span><kbd>Esc</kbd> 閉じる</span>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main" id="main">
    <!-- Top Page: Category Cards -->
    <section class="top-page" id="top-page">
      <div class="top-page__hero">
        <h1 class="top-page__title">AI活用プロンプト集</h1>
        <p class="top-page__subtitle">業務で使えるプロンプトテンプレートをカテゴリ別にまとめました。<br>📋プロンプトをコピーして、ステップに沿って使えます。💡解説で使い方のコツも確認できます。</p>
        <div class="top-page__stats" id="stats-row">
          <div class="stat-item">
            <span class="stat-item__number" id="stat-prompts">0</span>
            <span class="stat-item__label">プロンプト</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-item__number" id="stat-categories">0</span>
            <span class="stat-item__label">カテゴリ</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-item__number" id="stat-copies">0</span>
            <span class="stat-item__label">利用回数</span>
          </div>
        </div>
      </div>
      <div class="category-grid" id="category-grid">
        <!-- Dynamically generated -->
      </div>
    </section>

    <!-- Category Detail Page -->
    <section class="category-page" id="category-page" style="display:none;">
      <div class="category-page__header">
        <button class="back-btn" id="back-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6" />
          </svg>
          戻る
        </button>
        <div class="category-page__title-row">
          <span class="category-page__icon" id="cat-icon"></span>
          <h2 class="category-page__title" id="cat-title"></h2>
        </div>
        <p class="category-page__desc" id="cat-desc"></p>
      </div>
      <div class="category-page__filter">
        <div class="filter-tabs" id="filter-tabs">
          <!-- Dynamically generated -->
        </div>
      </div>
      <div class="prompt-list" id="prompt-list">
        <!-- Dynamically generated -->
      </div>
    </section>

    <!-- Search Results Page -->
    <section class="search-results" id="search-results" style="display:none;">
      <div class="search-results__header">
        <button class="back-btn" id="search-back-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6" />
          </svg>
          戻る
        </button>
        <h2 class="search-results__title">検索結果: <span id="search-query-display"></span></h2>
        <p class="search-results__count" id="search-count"></p>
      </div>
      <div class="prompt-list" id="search-prompt-list">
        <!-- Dynamically generated -->
      </div>
    </section>
  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="20 6 9 17 4 12" />
    </svg>
    <span id="toast-msg">コピーしました</span>
  </div>

  <footer class="footer">
    <div class="footer__inner">
      <p>© 2026 AI Prompt Lab — 社内スタッフ向けリファレンス</p>
      <div class="footer__shortcuts">
        <span><kbd>⌘K</kbd> 検索</span>
        <span><kbd>/</kbd> 検索</span>
        <span><kbd>Esc</kbd> 閉じる</span>
      </div>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>

</html>
